name: Build S22 StealthStation Kernel
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev python3 \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu clang lld lz4 cpio \
            xz-utils zip device-tree-compiler libncurses-dev rsync curl git

      - name: Fetch kernel source
        run: |
          git clone --depth=1 https://github.com/yoro1836/android_kernel_samsung_sm8450_s22 kernel_src
          ls kernel_src/Makefile && echo "CLONE OK" || (echo "CLONE FAILED"; exit 1)
          echo "=== DEFCONFIGS ==="
          ls kernel_src/arch/arm64/configs/ | grep -i "taro\|r0q\|r0s\|s22\|s901" || ls kernel_src/arch/arm64/configs/ | head -20

      - name: Inject RTL8188FU
        run: |
          git clone --depth=1 https://github.com/kelebek333/rtl8188fu /tmp/rtl8188fu || true
          WDIR=kernel_src/drivers/net/wireless
          mkdir -p "$WDIR/rtl8188fu"
          cp -r /tmp/rtl8188fu/. "$WDIR/rtl8188fu/"
          grep -q rtl8188fu "$WDIR/Makefile" || echo 'obj-$(CONFIG_RTL8188FU) += rtl8188fu/' >> "$WDIR/Makefile"
          echo "RTL8188FU OK"

      - name: Inject RTL8812AU
        run: |
          git clone --depth=1 https://github.com/aircrack-ng/rtl8812au /tmp/rtl8812au || true
          WDIR=kernel_src/drivers/net/wireless
          mkdir -p "$WDIR/rtl8812au"
          cp -r /tmp/rtl8812au/. "$WDIR/rtl8812au/"
          grep -q rtl8812au "$WDIR/Makefile" || echo 'obj-$(CONFIG_RTL8812AU) += rtl8812au/' >> "$WDIR/Makefile"
          echo "RTL8812AU OK"

      - name: Integrate KernelSU
        run: |
          cd kernel_src
          rm -rf drivers/kernelsu
          git clone --depth=1 https://github.com/tiann/KernelSU drivers/kernelsu
          grep -q kernelsu drivers/Kconfig  || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          grep -q kernelsu drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          echo "KernelSU OK"

      - name: Patch kernel
        run: python3 .github/scripts/patch_kernel.py kernel_src

      - name: Configure kernel
        run: |
          cd kernel_src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          DC=$(ls arch/arm64/configs/ | grep -i "taro\|r0q\|s22" | head -1)
          [ -z "$DC" ] && DC=$(ls arch/arm64/configs/ | grep -iv "generic\|fragment" | head -1)
          echo "Using defconfig: $DC"
          cp arch/arm64/configs/$DC arch/arm64/configs/stealth_defconfig

          # KernelSU + Wi-Fi adapters
          echo "CONFIG_KSU=y"           >> arch/arm64/configs/stealth_defconfig
          echo "CONFIG_RTL8188FU=m"     >> arch/arm64/configs/stealth_defconfig
          echo "CONFIG_RTL8812AU=m"     >> arch/arm64/configs/stealth_defconfig

          # Apply nethunter_fragment.config
          cat $GITHUB_WORKSPACE/nethunter_fragment.config >> arch/arm64/configs/stealth_defconfig
          echo "NetHunter config applied"

          # Apply extra_features.config
          cat $GITHUB_WORKSPACE/extra_features.config >> arch/arm64/configs/stealth_defconfig
          echo "Extra features config applied"

          make O=out stealth_defconfig
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/' out/.config
          sed -i '/CONFIG_GCC_PLUGINS/d' out/.config
          echo '# CONFIG_GCC_PLUGINS is not set' >> out/.config

          echo "=== NetHunter configs verified ==="
          grep -E "CONFIG_CFG80211|CONFIG_USB_GADGET|CONFIG_TUN|CONFIG_NAMESPACES|CONFIG_KSU" out/.config

      - name: Build kernel
        run: |
          cd kernel_src
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) O=out KCFLAGS="-w -Wno-error" Image 2>&1 | tee out/build.log
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "BUILD SUCCESS"
            ls -lh out/arch/arm64/boot/Image
          else
            echo "=== BUILD ERRORS ==="
            grep " error:" out/build.log | tail -40
            exit 1
          fi

      - name: Package AnyKernel3
        if: success()
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 /tmp/AK3
          cp kernel_src/out/arch/arm64/boot/Image /tmp/AK3/Image
          cd /tmp/AK3
          zip -r9 "$GITHUB_WORKSPACE/S22-StealthStation-NetHunter-$(date +%Y%m%d-%H%M).zip" . -x ".git/*"
          echo "PACKAGE DONE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: S22-StealthStation-NetHunter
          path: S22-StealthStation-NetHunter-*.zip
          if-no-files-found: warn
