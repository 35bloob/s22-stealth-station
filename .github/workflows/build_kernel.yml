name: Build S22 NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernelsu:
        description: 'Enable KernelSU'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      extra_features:
        description: 'Enable extra stealth features'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      create_release:
        description: 'Create GitHub release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc flex bison libssl-dev \
            libelf-dev git curl wget zip unzip python3 device-tree-compiler \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev \
            jq rsync

      - name: Download kernel source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "--- Downloading release ---"
          gh release download kernel-source --dir .
          ls -lh
          ARCHIVE=$(ls *.zip 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] && ARCHIVE=$(ls *.tar.gz 2>/dev/null | head -1)
          echo "Archive: $ARCHIVE"
          mkdir -p kernel_src && cd kernel_src
          if echo "$ARCHIVE" | grep -qi '\.zip$'; then
            unzip "../$ARCHIVE"
          else
            tar xf "../$ARCHIVE"
          fi
          for f in *.tar.gz; do
            [ -f "$f" ] && echo "Extracting $f" && tar xzf "$f" || true
          done
          chmod -R u+w .
          KDIR=$(find . -maxdepth 5 -type d -name "arch" -exec test -d "{}/arm64/configs" \; -print 2>/dev/null | head -1 | sed 's|/arch$||')
          if [ -z "$KDIR" ]; then
            echo "ERROR: No arch/arm64/configs found"
            find . -maxdepth 5 -type d | head -50
            exit 1
          fi
          FULL=$(cd "$KDIR" && pwd)
          echo "KERNEL_DIR=$FULL" >> $GITHUB_ENV
          echo "Kernel at: $FULL"
          ls "$FULL/arch/arm64/configs/"

      - name: Nuke Samsung forbidden warnings
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .

          echo "=== PHASE 1: Find ALL forbidden-warning files ==="
          grep -rl "forbidden" scripts/ . --include="*.py" --include="*.sh" --include="*.pl" --include="Makefile*" --include="*.c" --include="*.h" 2>/dev/null | head -30 || true

          echo "=== PHASE 2: Nuke gcc-wrapper / cc-wrapper scripts ==="
          for wrapper in scripts/gcc-wrapper.py scripts/cc-wrapper.py scripts/gcc-checker.py; do
            if [ -f "$wrapper" ]; then
              echo "  Found: $wrapper — replacing with passthrough"
              cat > "$wrapper" << 'PYEOF'
#!/usr/bin/env python3
import sys, os
args = sys.argv[1:]
ret = os.spawnvp(os.P_WAIT, args[0], args)
sys.exit(ret)
PYEOF
              chmod +x "$wrapper"
            fi
          done

          echo "=== PHASE 3: Nuke forbidden in ALL Makefiles ==="
          find . -name "Makefile*" -o -name "*.mk" | while read mf; do
            if grep -q "forbidden\|WERROR\|Werror" "$mf" 2>/dev/null; then
              echo "  Cleaning: $mf"
              sed -i 's/-Werror[^ ]*//g; /forbidden/d; /WERROR/d' "$mf"
            fi
          done

          echo "=== PHASE 4: Nuke GCC plugins that enforce warnings ==="
          find scripts/gcc-plugins -name "*.so" -delete 2>/dev/null || true
          find scripts/gcc-plugins -name "*.c" | while read f; do
            if grep -qi "forbidden\|werror\|warning.*error" "$f" 2>/dev/null; then
              echo "  Emptying plugin: $f"
              echo "/* disabled */" > "$f"
            fi
          done

          echo "=== PHASE 5: Disable Kconfig WERROR ==="
          find . -name "Kconfig*" | while read kc; do
            if grep -q "WERROR" "$kc" 2>/dev/null; then
              echo "  Patching Kconfig: $kc"
              sed -i '/WERROR/,/^$/s/default y/default n/' "$kc"
            fi
          done

          echo "=== PHASE 6: Check for build-rule error injection ==="
          if [ -f scripts/Makefile.build ]; then
            # Samsung sometimes adds: $(error forbidden warning: ...)
            sed -i '/\$(error.*forbidden/d; /\$(error.*warning/d' scripts/Makefile.build
            # Also check for custom error functions
            sed -i 's/\$(call echo-error,.*forbidden.*)//' scripts/Makefile.build
          fi
          if [ -f scripts/Makefile.lib ]; then
            sed -i '/\$(error.*forbidden/d; /\$(error.*warning/d' scripts/Makefile.lib
          fi

          echo "Done — all forbidden warning mechanisms neutralized."

      - name: Patch source files with warnings
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "=== Patching psi.c ==="
          PSI=kernel/sched/psi.c
          if [ -f "$PSI" ]; then
            sed -i 's/%s %lu %lu %d %lu %lu/%s %llu %llu %d %llu %llu/g' "$PSI"
            echo "  Done"
          fi

          echo "=== Patching cred.c ==="
          CRED=kernel/cred.c
          if [ -f "$CRED" ]; then
            sed -i 's/cred->security: 0x%lx/cred->security: %p/' "$CRED"
            sed -i 's/printk("\[KDP\] cred->security: %p\\n", cred->security);/printk("[KDP] cred->security: %p\\n", cred->security);/' "$CRED"
            echo "  Done"
          fi

          echo "=== Patching kernel.h tracing_mark ==="
          KH=include/linux/kernel.h
          if [ -f "$KH" ]; then
            # Replace empty format string "" with " " in __tracing_mark calls
            sed -i 's/__tracing_mark(TRACING_MARK_TYPE_END, "")/__tracing_mark(TRACING_MARK_TYPE_END, " ")/g' "$KH"
            # Also fix any similar pattern
            sed -i 's/snprintf(buf, TRACING_MARK_BUF_SIZE, "", /snprintf(buf, TRACING_MARK_BUF_SIZE, " ", /g' "$KH"
            echo "  Done"
          fi

          echo "=== Scanning for other format warnings ==="
          # Preemptively fix common Samsung format mismatches
          find kernel/ mm/ -name "*.c" | while read f; do
            if grep -q 'printk.*%lx.*cred\|printk.*%lu.*u64' "$f" 2>/dev/null; then
              echo "  Found potential: $f"
            fi
          done

      - name: Add RTL8188FTV driver
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "--- Cloning RTL8188FU driver ---"
          git clone --depth=1 https://github.com/kelebek333/rtl8188fu /tmp/rtl8188fu || true
          if [ -d /tmp/rtl8188fu ]; then
            mkdir -p drivers/net/wireless/rtl8188fu
            cp -r /tmp/rtl8188fu/* drivers/net/wireless/rtl8188fu/
            if [ ! -f drivers/net/wireless/rtl8188fu/Kconfig ]; then
              cat > drivers/net/wireless/rtl8188fu/Kconfig << 'KEOF'
config RTL8188FU
  tristate "Realtek RTL8188FU USB WiFi"
  depends on USB && CFG80211
  help
    Enable support for Realtek RTL8188FU/FTV USB WiFi adapters.
KEOF
            fi
            grep -q "rtl8188fu" drivers/net/wireless/Makefile 2>/dev/null || \
              echo 'obj-$(CONFIG_RTL8188FU) += rtl8188fu/' >> drivers/net/wireless/Makefile
            grep -q "rtl8188fu" drivers/net/wireless/Kconfig 2>/dev/null || \
              echo 'source "drivers/net/wireless/rtl8188fu/Kconfig"' >> drivers/net/wireless/Kconfig
            echo "RTL8188FU driver integrated"
          else
            echo "WARN: Could not clone RTL8188FU, skipping"
          fi

      - name: Apply NetHunter config
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          DC=""
          for p in "*s5e9925*" "*dm1s*" "*dm1*" "*s901*" "*exynos*" "*samsung*"; do
            DC=$(find arch/arm64/configs -type f -name "$p" 2>/dev/null | head -1)
            [ -n "$DC" ] && break
          done
          if [ -z "$DC" ]; then
            if [ -f arch/arm64/configs/gki_defconfig ]; then
              DC=arch/arm64/configs/gki_defconfig
            else
              DC=$(find arch/arm64/configs -maxdepth 1 -type f -name '*defconfig' | head -1)
            fi
          fi
          echo "Base defconfig: $DC"
          cp "$DC" arch/arm64/configs/stealth_defconfig
          if [ -d arch/arm64/configs/vendor ]; then
            find arch/arm64/configs/vendor -type f | while read frag; do
              cat "$frag" >> arch/arm64/configs/stealth_defconfig
            done
          fi
          cat ${{ github.workspace }}/configs/nethunter_fragment.config >> arch/arm64/configs/stealth_defconfig
          if [ "${{ inputs.extra_features }}" = "true" ]; then
            cat ${{ github.workspace }}/configs/extra_features.config >> arch/arm64/configs/stealth_defconfig
          fi
          echo "CONFIG_WERROR=n" >> arch/arm64/configs/stealth_defconfig
          echo "# CONFIG_GCC_PLUGINS is not set" >> arch/arm64/configs/stealth_defconfig
          echo "Total lines: $(wc -l < arch/arm64/configs/stealth_defconfig)"

      - name: Patch KernelSU
        if: inputs.kernelsu == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          echo -e "CONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/stealth_defconfig

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export PLATFORM_VERSION=13
          export ANDROID_MAJOR_VERSION=t
          make O=out stealth_defconfig
          # Double-ensure: disable werror in generated .config
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/' out/.config
          sed -i 's/CONFIG_GCC_PLUGINS=y/# CONFIG_GCC_PLUGINS is not set/' out/.config
          make O=out -j$(nproc) KCFLAGS="-w" EXTRA_CFLAGS="-w -Wno-error" Image 2>&1 | tail -200
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            exit 1
          fi

      - name: Package with AnyKernel3
        if: env.BUILD_SUCCESS == 'true'
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 /tmp/AnyKernel3
          rm -f /tmp/AnyKernel3/anykernel.sh
          cp ${{ github.workspace }}/anykernel/anykernel.sh /tmp/AnyKernel3/anykernel.sh
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image /tmp/AnyKernel3/Image
          cd /tmp/AnyKernel3
          rm -f *.md patch/sample* ramdisk/placeholder 2>/dev/null || true
          BUILD_DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="S22-StealthStation-${BUILD_DATE}.zip"
          zip -r9 "$ZIP_NAME" . -x ".git/*"
          mkdir -p ${{ github.workspace }}/output
          cp "$ZIP_NAME" ${{ github.workspace }}/output/
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image ${{ github.workspace }}/output/
          cp ${{ env.KERNEL_DIR }}/out/.config ${{ github.workspace }}/output/kernel_config.txt 2>/dev/null || true
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          ls -lh ${{ github.workspace }}/output/

      - name: Upload artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: S22-StealthStation-Kernel
          path: output/
          retention-days: 30

      - name: Create GitHub release
        if: env.BUILD_SUCCESS == 'true' && inputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="kernel-${{ env.BUILD_DATE }}"
          gh release create "$TAG" \
            ${{ github.workspace }}/output/${{ env.ZIP_NAME }} \
            ${{ github.workspace }}/output/Image \
            --title "S22 StealthStation ${{ env.BUILD_DATE }}" \
            --notes "KernelSU=${{ inputs.kernelsu }} | ExtraFeatures=${{ inputs.extra_features }}" \
            --latest
