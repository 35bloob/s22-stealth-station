name: Build S22 NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernelsu:
        description: 'Enable KernelSU'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      extra_features:
        description: 'Enable extra stealth features'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc flex bison libssl-dev \
            libelf-dev git curl wget zip unzip python3 device-tree-compiler \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev

      - name: Download kernel source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "--- Downloading release ---"
          gh release download kernel-source --dir .
          ls -lh
          ARCHIVE=$(ls *.zip 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] && ARCHIVE=$(ls *.tar.gz 2>/dev/null | head -1)
          echo "Archive: $ARCHIVE"
          mkdir -p kernel_src && cd kernel_src
          if echo "$ARCHIVE" | grep -qi '\.zip$'; then
            unzip "../$ARCHIVE"
          else
            tar xf "../$ARCHIVE"
          fi
          echo "--- Top-level ---"
          ls -la
          for f in *.tar.gz; do
            [ -f "$f" ] && echo "Extracting $f" && tar xzf "$f" || true
          done
          echo "--- Fixing permissions ---"
          chmod -R u+w .
          echo "--- Finding kernel directory ---"
          KDIR=$(find . -maxdepth 5 -type d -name "arch" -exec test -d "{}/arm64/configs" \; -print 2>/dev/null | head -1 | sed 's|/arch$||')
          if [ -z "$KDIR" ]; then
            echo "ERROR: No arch/arm64/configs found"
            find . -maxdepth 5 -type d | head -50
            exit 1
          fi
          FULL=$(cd "$KDIR" && pwd)
          echo "KERNEL_DIR=$FULL" >> $GITHUB_ENV
          echo "Kernel at: $FULL"
          ls "$FULL/arch/arm64/configs/"

      - name: Apply NetHunter config
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          echo "--- All defconfigs ---"
          find arch/arm64/configs -type f | sort
          echo "--- Vendor contents ---"
          find arch/arm64/configs/vendor -type f 2>/dev/null | sort || echo "No vendor dir"
          DC=""
          for p in "*s5e9925*" "*dm1s*" "*dm1*" "*s901*" "*exynos*" "*samsung*"; do
            DC=$(find arch/arm64/configs -type f -name "$p" 2>/dev/null | head -1)
            [ -n "$DC" ] && break
          done
          if [ -z "$DC" ]; then
            if [ -f arch/arm64/configs/gki_defconfig ]; then
              DC=arch/arm64/configs/gki_defconfig
              echo "Fallback: gki_defconfig"
            else
              DC=$(find arch/arm64/configs -maxdepth 1 -type f -name '*defconfig' | head -1)
              echo "Fallback: $DC"
            fi
          fi
          echo "Base defconfig: $DC"
          cp "$DC" arch/arm64/configs/stealth_defconfig
          if [ -d arch/arm64/configs/vendor ]; then
            echo "--- Appending ALL vendor fragments ---"
            find arch/arm64/configs/vendor -type f | while read frag; do
              echo "  + $frag"
              cat "$frag" >> arch/arm64/configs/stealth_defconfig
            done
          fi
          cat ${{ github.workspace }}/configs/nethunter_fragment.config >> arch/arm64/configs/stealth_defconfig
          if [ "${{ inputs.extra_features }}" = "true" ]; then
            cat ${{ github.workspace }}/configs/extra_features.config >> arch/arm64/configs/stealth_defconfig
          fi
          echo "Total lines: $(wc -l < arch/arm64/configs/stealth_defconfig)"

      - name: Patch KernelSU
        if: inputs.kernelsu == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          echo -e "CONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/stealth_defconfig

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export PLATFORM_VERSION=13
          export ANDROID_MAJOR_VERSION=t
          make O=out stealth_defconfig
          make O=out -j$(nproc) Image 2>&1 | tail -100
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            exit 1
          fi

      - name: Package output
        if: env.BUILD_SUCCESS == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          mkdir -p ${{ github.workspace }}/output
          cp out/arch/arm64/boot/Image ${{ github.workspace }}/output/Image 2>/dev/null || true
          cp out/arch/arm64/boot/Image.gz ${{ github.workspace }}/output/Image.gz 2>/dev/null || true
          cp out/.config ${{ github.workspace }}/output/kernel_config.txt 2>/dev/null || true
          ls -lh ${{ github.workspace }}/output/

      - name: Upload artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: S22-StealthStation-Kernel
          path: output/
          retention-days: 30
