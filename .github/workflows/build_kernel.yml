name: Build S22 StealthStation Kernel
on:
  workflow_dispatch:
    inputs:
      kernelsu:
        description: 'KernelSU'
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
      create_release:
        description: 'Create release'
        required: true
        default: 'true'
        type: choice
        options: ['true','false']
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deps
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential bc flex bison libssl-dev libelf-dev git curl wget zip unzip python3 device-tree-compiler gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev jq rsync
      - name: GCC wrapper
        run: |
          REAL=$(which aarch64-linux-gnu-gcc)
          sudo cp "$REAL" "${REAL}.real"
          printf '#!/bin/bash
exec "${0}.real" "$@" -w -Wno-error 2>&1
' | sudo tee "$REAL" > /dev/null
          sudo chmod +x "$REAL"
      - name: Fetch source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download kernel-source --dir . --repo ${{ github.repository }} 2>/dev/null || true
          ARCHIVE=$(ls SM-*.zip 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] && ARCHIVE=$(ls *.zip 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] && echo "Upload SM-S901E_SEA_15_Opensource.zip as release tag: kernel-source" && exit 1
          mkdir -p kernel_src && cd kernel_src
          unzip -q "../$ARCHIVE"
          chmod -R u+w .
          KDIR=$(find . -maxdepth 8 -type d -name "arch" 2>/dev/null | while read d; do [ -d "$d/arm64/configs" ] && echo "$d"; done | head -1 | sed 's|/arch$||')
          echo "KERNEL_DIR=$(cd "$KDIR" && pwd)" >> $GITHUB_ENV
      - name: KernelSU
        if: inputs.kernelsu == 'true'
        run: |
          cd "${{ env.KERNEL_DIR }}" && chmod -R u+w .
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
      - name: Quick Patch
        run: |
          cd "${{ env.KERNEL_DIR }}" && chmod -R u+w .
          # Fix f2fs flush_group error
          find fs/f2fs -name "data.c" -exec sed -i 's/in_group_p(F2FS_OPTION(sbi).flush_group)/0/g' {} +
          # Remove Werror from Makefiles
          find . -name "Makefile" -exec sed -i 's/-Werror//g' {} +
          # Strip ALL u/U/l/L suffixes from hex constants
          find arch/arm64 include drivers fs security net kernel -name "*.[ch]" -exec sed -i -E 's/(0x[0-9a-fA-F]+)[uUlL]+/\u0001/g' {} +
      - name: Defconfig
        run: |
          cd "${{ env.KERNEL_DIR }}"
          DC=$(find arch/arm64/configs -maxdepth 2 -type f -name "*s901*" 2>/dev/null | head -1)
          [ -z "$DC" ] && DC=$(find arch/arm64/configs -maxdepth 1 -type f -name '*defconfig' | head -1)
          cp "$DC" arch/arm64/configs/stealth_defconfig
          printf '
CONFIG_WERROR=n
# CONFIG_GCC_PLUGINS is not set
' >> arch/arm64/configs/stealth_defconfig
      - name: Compile
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-
          make O=out stealth_defconfig
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/' out/.config
          sed -i 's/CONFIG_GCC_PLUGINS=y/# CONFIG_GCC_PLUGINS is not set/' out/.config
          make O=out -j$(nproc) KCFLAGS="-w -Wno-error" HOSTCFLAGS="-w -Wno-error" Image 2>&1 | tee ~/build.log
          [ -f out/arch/arm64/boot/Image ] && echo "BUILD_SUCCESS=true" >> $GITHUB_ENV || { tail -50 ~/build.log; exit 1; }
      - name: Package
        if: env.BUILD_SUCCESS == 'true'
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 /tmp/AK3
          cp "${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image" /tmp/AK3/Image
          cd /tmp/AK3 && rm -f *.md patch/sample* ramdisk/placeholder
          BD=$(date +%Y%m%d-%H%M) && ZN="S22-StealthStation-${BD}.zip"
          zip -r9 "$ZN" . -x ".git/*"
          mkdir -p ${{ github.workspace }}/output
          cp "$ZN" ${{ github.workspace }}/output/
          echo "ZIP_NAME=$ZN" >> $GITHUB_ENV && echo "BUILD_DATE=$BD" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        if: env.BUILD_SUCCESS == 'true'
        with:
          name: S22-StealthStation-Kernel
          path: output/
          retention-days: 30
