name: Build Kernel
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev python3 gcc-aarch64-linux-gnu
      - name: Patch kernel
        run: python3 .github/scripts/patch_kernel.py .
      - name: Build kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) O=out vendor/kalama_GKI.config
          make -j$(nproc) O=out
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: out/arch/arm64/boot/
