name: Build S22 NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernelsu:
        description: 'Enable KernelSU'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      extra_features:
        description: 'Enable extra stealth features'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      create_release:
        description: 'Create GitHub release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc flex bison libssl-dev \
            libelf-dev git curl wget zip unzip python3 device-tree-compiler \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev \
            jq rsync

      - name: Download kernel source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download kernel-source --dir .
          ls -lh
          ARCHIVE=$(ls *.zip 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] && ARCHIVE=$(ls *.tar.gz 2>/dev/null | head -1)
          echo "Archive: $ARCHIVE"
          mkdir -p kernel_src && cd kernel_src
          if echo "$ARCHIVE" | grep -qi '\.zip$'; then
            unzip "../$ARCHIVE"
          else
            tar xf "../$ARCHIVE"
          fi
          for f in *.tar.gz; do
            [ -f "$f" ] && echo "Extracting $f" && tar xzf "$f" || true
          done
          chmod -R u+w .
          KDIR=$(find . -maxdepth 5 -type d -name "arch" -exec test -d "{}/arm64/configs" \; -print 2>/dev/null | head -1 | sed 's|/arch$||')
          if [ -z "$KDIR" ]; then
            echo "ERROR: No arch/arm64/configs found"
            exit 1
          fi
          FULL=$(cd "$KDIR" && pwd)
          echo "KERNEL_DIR=$FULL" >> $GITHUB_ENV
          echo "Kernel at: $FULL"

      - name: Fix source warnings with Python
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .

          echo "=== Finding ALL cred.c files ==="
          find . -name "cred.c" 2>/dev/null
          echo ""

          echo "=== cred.c line 161 BEFORE ==="
          sed -n '158,165p' kernel/cred.c || echo "FILE NOT FOUND at kernel/cred.c"
          echo ""

          echo "=== Using Python to patch ==="
          python3 << 'PYEOF'
import os, glob

# Find all cred.c files
for root, dirs, files in os.walk('.'):
    for fname in files:
        if fname == 'cred.c':
            fpath = os.path.join(root, fname)
            with open(fpath, 'r') as f:
                content = f.read()
            if '0x%lx' in content:
                original = content
                # Fix 1: replace 0x%lx with %p
                content = content.replace('0x%lx', '%p')
                with open(fpath, 'w') as f:
                    f.write(content)
                print(f"PATCHED: {fpath} ({original.count('0x%lx')} replacements)")
            else:
                print(f"SKIP (no 0x%lx): {fpath}")

# Fix kernel.h tracing_mark_end empty format string
for root, dirs, files in os.walk('.'):
    for fname in files:
        if fname == 'kernel.h' and 'include/linux' in root:
            fpath = os.path.join(root, fname)
            with open(fpath, 'r') as f:
                content = f.read()
            if 'TRACING_MARK_TYPE_END, ""' in content:
                content = content.replace('TRACING_MARK_TYPE_END, ""', 'TRACING_MARK_TYPE_END, " "')
                with open(fpath, 'w') as f:
                    f.write(content)
                print(f"PATCHED: {fpath} (tracing_mark_end)")
            else:
                print(f"SKIP (no empty fmt): {fpath}")

# Fix psi.c %lu for u64
for root, dirs, files in os.walk('.'):
    for fname in files:
        if fname == 'psi.c' and 'kernel/sched' in root:
            fpath = os.path.join(root, fname)
            with open(fpath, 'r') as f:
                content = f.read()
            if '%lu' in content:
                content = content.replace('%lu', '%llu')
                with open(fpath, 'w') as f:
                    f.write(content)
                print(f"PATCHED: {fpath}")

# Nuclear: find ANY file with "forbidden" in scripts/
for root, dirs, files in os.walk('scripts'):
    for fname in files:
        fpath = os.path.join(root, fname)
        try:
            with open(fpath, 'r') as f:
                content = f.read()
            if 'forbidden' in content.lower():
                print(f"FORBIDDEN FOUND: {fpath}")
                # Show the lines
                for i, line in enumerate(content.split('\n'), 1):
                    if 'forbidden' in line.lower():
                        print(f"  Line {i}: {line.strip()}")
        except:
            pass
PYEOF

          echo ""
          echo "=== cred.c line 161 AFTER ==="
          sed -n '158,165p' kernel/cred.c

          echo ""
          echo "=== Makefile.build lines 270-290 ==="
          sed -n '270,290p' scripts/Makefile.build

      - name: Nuke forbidden-warning system
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .

          # Nuke it in Makefile.build using Python
          python3 << 'PYEOF'
import os

# Process Makefile.build - remove forbidden warning enforcement
mb = 'scripts/Makefile.build'
if os.path.exists(mb):
    with open(mb, 'r') as f:
        lines = f.readlines()
    new_lines = []
    for i, line in enumerate(lines):
        if 'forbidden' in line.lower() or 'warn-error' in line.lower():
            print(f"  REMOVED line {i+1}: {line.strip()}")
            # Replace with empty/comment
            new_lines.append('# disabled\n')
        else:
            new_lines.append(line)
    with open(mb, 'w') as f:
        f.writelines(new_lines)
    print(f"Cleaned {mb}")

# Process ALL files in scripts/ for forbidden
for root, dirs, files in os.walk('scripts'):
    for fname in files:
        fpath = os.path.join(root, fname)
        try:
            with open(fpath, 'r') as f:
                content = f.read()
            if 'forbidden' in content.lower():
                content2 = '\n'.join(
                    '# disabled' if 'forbidden' in line.lower() else line
                    for line in content.split('\n')
                )
                with open(fpath, 'w') as f:
                    f.write(content2)
                print(f"Cleaned: {fpath}")
        except:
            pass

# Also strip -Werror from all Makefiles
for root, dirs, files in os.walk('.'):
    for fname in files:
        if 'Makefile' in fname or fname.endswith('.mk'):
            fpath = os.path.join(root, fname)
            try:
                with open(fpath, 'r') as f:
                    content = f.read()
                if '-Werror' in content:
                    import re
                    content = re.sub(r'-Werror\S*', '', content)
                    with open(fpath, 'w') as f:
                        f.write(content)
                    print(f"Stripped -Werror: {fpath}")
            except:
                pass

# Delete GCC plugin .so files
for root, dirs, files in os.walk('scripts'):
    for fname in files:
        if fname.endswith('.so'):
            fpath = os.path.join(root, fname)
            os.remove(fpath)
            print(f"Deleted plugin: {fpath}")
PYEOF

          # Replace any gcc wrapper scripts
          for wrapper in scripts/gcc-wrapper.py scripts/cc-wrapper.py scripts/gcc-checker.py; do
            if [ -f "$wrapper" ]; then
              printf '#!/usr/bin/env python3\nimport sys,os\nret=os.spawnvp(os.P_WAIT,sys.argv[1],sys.argv[1:])\nsys.exit(ret)\n' > "$wrapper"
              chmod +x "$wrapper"
              echo "Replaced wrapper: $wrapper"
            fi
          done

      - name: Add RTL8188FTV driver
        run: |
          cd ${{ env.KERNEL_DIR }}
          git clone --depth=1 https://github.com/kelebek333/rtl8188fu /tmp/rtl8188fu || true
          if [ -d /tmp/rtl8188fu ]; then
            mkdir -p drivers/net/wireless/rtl8188fu
            cp -r /tmp/rtl8188fu/* drivers/net/wireless/rtl8188fu/
            if [ ! -f drivers/net/wireless/rtl8188fu/Kconfig ]; then
              cat > drivers/net/wireless/rtl8188fu/Kconfig << 'KEOF'
config RTL8188FU
  tristate "Realtek RTL8188FU USB WiFi"
  depends on USB && CFG80211
  help
    Enable support for Realtek RTL8188FU/FTV USB WiFi adapters.
KEOF
            fi
            grep -q "rtl8188fu" drivers/net/wireless/Makefile 2>/dev/null || \
              echo 'obj-$(CONFIG_RTL8188FU) += rtl8188fu/' >> drivers/net/wireless/Makefile
            grep -q "rtl8188fu" drivers/net/wireless/Kconfig 2>/dev/null || \
              echo 'source "drivers/net/wireless/rtl8188fu/Kconfig"' >> drivers/net/wireless/Kconfig
          fi

      - name: Apply NetHunter config
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          DC=""
          for p in "*s5e9925*" "*dm1s*" "*dm1*" "*s901*" "*exynos*" "*samsung*"; do
            DC=$(find arch/arm64/configs -type f -name "$p" 2>/dev/null | head -1)
            [ -n "$DC" ] && break
          done
          if [ -z "$DC" ]; then
            if [ -f arch/arm64/configs/gki_defconfig ]; then
              DC=arch/arm64/configs/gki_defconfig
            else
              DC=$(find arch/arm64/configs -maxdepth 1 -type f -name '*defconfig' | head -1)
            fi
          fi
          echo "Base defconfig: $DC"
          cp "$DC" arch/arm64/configs/stealth_defconfig
          if [ -d arch/arm64/configs/vendor ]; then
            find arch/arm64/configs/vendor -type f | while read frag; do
              cat "$frag" >> arch/arm64/configs/stealth_defconfig
            done
          fi
          cat ${{ github.workspace }}/configs/nethunter_fragment.config >> arch/arm64/configs/stealth_defconfig
          if [ "${{ inputs.extra_features }}" = "true" ]; then
            cat ${{ github.workspace }}/configs/extra_features.config >> arch/arm64/configs/stealth_defconfig
          fi
          cat >> arch/arm64/configs/stealth_defconfig << 'DCEOF'
CONFIG_WERROR=n
# CONFIG_GCC_PLUGINS is not set
DCEOF

      - name: Patch KernelSU
        if: inputs.kernelsu == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          echo -e "CONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/stealth_defconfig

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export PLATFORM_VERSION=13
          export ANDROID_MAJOR_VERSION=t
          make O=out stealth_defconfig
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/' out/.config
          sed -i 's/CONFIG_GCC_PLUGINS=y/# CONFIG_GCC_PLUGINS is not set/' out/.config
          make O=out -j$(nproc) KCFLAGS="-w" EXTRA_CFLAGS="-w -Wno-error" Image 2>&1 | tail -200
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            exit 1
          fi

      - name: Package with AnyKernel3
        if: env.BUILD_SUCCESS == 'true'
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 /tmp/AnyKernel3
          rm -f /tmp/AnyKernel3/anykernel.sh
          cp ${{ github.workspace }}/anykernel/anykernel.sh /tmp/AnyKernel3/anykernel.sh
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image /tmp/AnyKernel3/Image
          cd /tmp/AnyKernel3
          rm -f *.md patch/sample* ramdisk/placeholder 2>/dev/null || true
          BUILD_DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="S22-StealthStation-${BUILD_DATE}.zip"
          zip -r9 "$ZIP_NAME" . -x ".git/*"
          mkdir -p ${{ github.workspace }}/output
          cp "$ZIP_NAME" ${{ github.workspace }}/output/
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image ${{ github.workspace }}/output/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      - name: Upload artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: S22-StealthStation-Kernel
          path: output/
          retention-days: 30

      - name: Create GitHub release
        if: env.BUILD_SUCCESS == 'true' && inputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="kernel-${{ env.BUILD_DATE }}"
          gh release create "$TAG" \
            ${{ github.workspace }}/output/${{ env.ZIP_NAME }} \
            ${{ github.workspace }}/output/Image \
            --title "S22 StealthStation ${{ env.BUILD_DATE }}" \
            --notes "KernelSU=${{ inputs.kernelsu }} | ExtraFeatures=${{ inputs.extra_features }}" \
            --latest
