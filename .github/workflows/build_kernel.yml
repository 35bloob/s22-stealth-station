name: Build S22 NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernelsu:
        description: 'Enable KernelSU'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      extra_features:
        description: 'Enable extra stealth features'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      create_release:
        description: 'Create GitHub release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc flex bison libssl-dev \
            libelf-dev git curl wget zip unzip python3 device-tree-compiler \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev \
            jq rsync

      - name: Replace system GCC with warning-suppressing wrapper
        run: |
          REAL_GCC=$(which aarch64-linux-gnu-gcc)
          echo "Real GCC at: $REAL_GCC"
          sudo cp "$REAL_GCC" "${REAL_GCC}.real"
          printf '#!/bin/bash\nexec "${0}.real" "$@" -w -Wno-error\n' | sudo tee "$REAL_GCC" > /dev/null
          sudo chmod +x "$REAL_GCC"
          echo "Wrapper installed:"
          cat "$REAL_GCC"

      - name: Download kernel source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download kernel-source --dir .
          ARCHIVE=$(ls *.zip 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] && ARCHIVE=$(ls *.tar.gz 2>/dev/null | head -1)
          mkdir -p kernel_src && cd kernel_src
          if echo "$ARCHIVE" | grep -qi '\.zip$'; then
            unzip "../$ARCHIVE"
          else
            tar xf "../$ARCHIVE"
          fi
          for f in *.tar.gz; do
            [ -f "$f" ] && tar xzf "$f" || true
          done
          chmod -R u+w .
          KDIR=$(find . -maxdepth 5 -type d -name "arch" -exec test -d "{}/arm64/configs" \; -print 2>/dev/null | head -1 | sed 's|/arch$||')
          [ -z "$KDIR" ] && echo "ERROR: kernel dir not found" && exit 1
          FULL=$(cd "$KDIR" && pwd)
          echo "KERNEL_DIR=$FULL" >> $GITHUB_ENV
          echo "Kernel at: $FULL"

      - name: Kill Samsung forbidden-warning system
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .

          echo "=== Hunting gcc-wrapper and forbidden-warning scripts ==="
          # Find and neuter ANY script that outputs 'forbidden warning'
          grep -rl "forbidden warning" . --include="*.py" --include="*.pl" --include="*.sh" 2>/dev/null | while read f; do
            echo "DISABLING: $f"
            # Replace the forbidden-warning error line with a no-op print
            sed -i 's/.*forbidden warning.*$/print("forbidden warning suppressed")/' "$f" 2>/dev/null || true
            # Also replace sys.exit calls near forbidden
            python3 - "$f" << 'PYEOF'
          import sys, re
          f = sys.argv[1]
          t = open(f).read()
          # Remove any sys.exit() that follows a forbidden warning check
          t = re.sub(r'(.*forbidden.*\n.*sys\.exit.*)', r'# \1', t)
          t = re.sub(r'raise\s+\w*Error.*forbidden.*', '# forbidden check removed', t)
          open(f, 'w').write(t)
          print(f"Deep-cleaned: {f}")
          PYEOF
          done

          # Specifically target gcc-wrapper.py - the main Samsung forbidden-warning enforcer
          for wrapper in scripts/gcc-wrapper.py scripts/gcc_version_check.py scripts/check_compiler.py; do
            if [ -f "$wrapper" ]; then
              echo "NEUTERING: $wrapper"
              # Keep the file but make it a pass-through
              cat > "$wrapper" << 'PASSTHROUGH'
          #!/usr/bin/env python3
          import sys, os, subprocess
          # Samsung gcc-wrapper neutered - pass all args directly to compiler
          result = subprocess.run(sys.argv[1:], capture_output=False)
          sys.exit(result.returncode)
          PASSTHROUGH
              echo "  -> replaced with pass-through"
            fi
          done

          # Strip -Werror from ALL Makefiles recursively
          echo "=== Stripping -Werror from Makefiles ==="
          find . -name "Makefile" -o -name "*.mk" | while read mf; do
            if grep -q "Werror" "$mf" 2>/dev/null; then
              sed -i 's/-Werror[a-z=\-]*//g' "$mf"
              echo "  CLEANED: $mf"
            fi
          done

          # Also check if gcc-wrapper is invoked via CC= override in top Makefile
          if grep -q "gcc-wrapper" Makefile 2>/dev/null; then
            echo "REMOVING gcc-wrapper from top Makefile"
            sed -i 's|scripts/gcc-wrapper.py ||g' Makefile
            sed -i 's|python.*gcc-wrapper.py||g' Makefile
          fi

          echo "=== Done ==="

      - name: Patch source files
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "--- Patching psi.c ---"
          PSI=$(find . -path "*/kernel/sched/psi.c" | head -1)
          if [ -n "$PSI" ]; then
            echo "Found: $PSI"
            echo "Before:"
            grep -n "psi: %s" "$PSI" || true
            sed -i 's/psi: %s %lu %lu %d %lu %lu/psi: %s %llu %llu %d %llu %llu/g' "$PSI"
            echo "After:"
            grep -n "psi: %s" "$PSI" || true
          else
            echo "WARNING: psi.c not found"
          fi

          echo "--- Patching cred.c ---"
          CRED=$(find . -name "cred.c" -path "*/kernel/*" | head -1)
          if [ -n "$CRED" ]; then
            sed -i 's/0x%lx/%p/g' "$CRED"
            echo "cred.c patched"
          fi

      - name: Add RTL8188FTV driver
        run: |
          cd ${{ env.KERNEL_DIR }}
          git clone --depth=1 https://github.com/kelebek333/rtl8188fu /tmp/rtl8188fu || true
          if [ -d /tmp/rtl8188fu ]; then
            mkdir -p drivers/net/wireless/rtl8188fu
            cp -r /tmp/rtl8188fu/* drivers/net/wireless/rtl8188fu/
            if [ ! -f drivers/net/wireless/rtl8188fu/Kconfig ]; then
              cat > drivers/net/wireless/rtl8188fu/Kconfig << 'KEOF'
config RTL8188FU
  tristate "Realtek RTL8188FU USB WiFi"
  depends on USB && CFG80211
  help
    Enable support for Realtek RTL8188FU/FTV USB WiFi adapters.
KEOF
            fi
            grep -q "rtl8188fu" drivers/net/wireless/Makefile 2>/dev/null || \
              echo 'obj-$(CONFIG_RTL8188FU) += rtl8188fu/' >> drivers/net/wireless/Makefile
            grep -q "rtl8188fu" drivers/net/wireless/Kconfig 2>/dev/null || \
              echo 'source "drivers/net/wireless/rtl8188fu/Kconfig"' >> drivers/net/wireless/Kconfig
          fi

      - name: Apply NetHunter config
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          DC=""
          for p in "*s5e9925*" "*dm1s*" "*dm1*" "*s901*" "*exynos*" "*samsung*"; do
            DC=$(find arch/arm64/configs -type f -name "$p" 2>/dev/null | head -1)
            [ -n "$DC" ] && break
          done
          if [ -z "$DC" ]; then
            DC=$(find arch/arm64/configs -maxdepth 1 -type f -name '*defconfig' | head -1)
          fi
          echo "Base defconfig: $DC"
          cp "$DC" arch/arm64/configs/stealth_defconfig
          if [ -d arch/arm64/configs/vendor ]; then
            find arch/arm64/configs/vendor -type f | while read frag; do
              cat "$frag" >> arch/arm64/configs/stealth_defconfig
            done
          fi
          cat ${{ github.workspace }}/configs/nethunter_fragment.config >> arch/arm64/configs/stealth_defconfig
          if [ "${{ inputs.extra_features }}" = "true" ]; then
            cat ${{ github.workspace }}/configs/extra_features.config >> arch/arm64/configs/stealth_defconfig
          fi
          cat >> arch/arm64/configs/stealth_defconfig << 'DCEOF'
CONFIG_WERROR=n
# CONFIG_GCC_PLUGINS is not set
DCEOF

      - name: Patch KernelSU
        if: inputs.kernelsu == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          echo -e "CONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/stealth_defconfig

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}

          # Verify patches applied
          echo "=== PRE-BUILD CHECKS ==="
          PSI=$(find . -path "*/kernel/sched/psi.c" | head -1)
          echo "psi.c format line:"
          grep -n "psi: %s" "$PSI" || echo "NOT FOUND"
          echo "gcc-wrapper status:"
          [ -f scripts/gcc-wrapper.py ] && head -3 scripts/gcc-wrapper.py || echo "no gcc-wrapper.py"
          echo "========================"

          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export PLATFORM_VERSION=13
          export ANDROID_MAJOR_VERSION=t

          make O=out stealth_defconfig
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/' out/.config
          sed -i 's/CONFIG_GCC_PLUGINS=y/# CONFIG_GCC_PLUGINS is not set/' out/.config

          echo "=== STARTING BUILD ==="
          set +e
          make O=out -j$(nproc) KCFLAGS="-w" Image 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "========================================"
            echo " ERRORS"
            echo "========================================"
            grep -E "^.*error[: ]|forbidden|undefined reference|fatal:" /tmp/build.log | grep -v "^#" | tail -80
            echo "========================================"
            echo " LAST 50 LINES"
            echo "========================================"
            tail -50 /tmp/build.log
            exit 1
          fi

          [ -f out/arch/arm64/boot/Image ] && echo "BUILD_SUCCESS=true" >> $GITHUB_ENV || exit 1
          echo "=== BUILD SUCCESS ==="

      - name: Package with AnyKernel3
        if: env.BUILD_SUCCESS == 'true'
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 /tmp/AnyKernel3
          rm -f /tmp/AnyKernel3/anykernel.sh
          cp ${{ github.workspace }}/anykernel/anykernel.sh /tmp/AnyKernel3/anykernel.sh
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image /tmp/AnyKernel3/Image
          cd /tmp/AnyKernel3
          rm -f *.md patch/sample* ramdisk/placeholder 2>/dev/null || true
          BUILD_DATE=$(date +%Y%m%d-%H%M)
          ZIP_NAME="S22-StealthStation-${BUILD_DATE}.zip"
          zip -r9 "$ZIP_NAME" . -x ".git/*"
          mkdir -p ${{ github.workspace }}/output
          cp "$ZIP_NAME" ${{ github.workspace }}/output/
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image ${{ github.workspace }}/output/
          cp ${{ env.KERNEL_DIR }}/out/.config ${{ github.workspace }}/output/kernel_config.txt 2>/dev/null || true
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          ls -lh ${{ github.workspace }}/output/

      - name: Upload artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: S22-StealthStation-Kernel
          path: output/
          retention-days: 30

      - name: Create GitHub release
        if: env.BUILD_SUCCESS == 'true' && inputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="kernel-${{ env.BUILD_DATE }}"
          gh release create "$TAG" \
            ${{ github.workspace }}/output/${{ env.ZIP_NAME }} \
            ${{ github.workspace }}/output/Image \
            --title "S22 StealthStation ${{ env.BUILD_DATE }}" \
            --notes "KernelSU=${{ inputs.kernelsu }} | ExtraFeatures=${{ inputs.extra_features }}" \
            --latest
