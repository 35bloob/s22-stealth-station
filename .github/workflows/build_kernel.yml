name: Build S22 NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernelsu:
        description: 'Enable KernelSU'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      extra_features:
        description: 'Enable extra stealth features'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc flex bison libssl-dev \
            libelf-dev git curl wget zip unzip python3 device-tree-compiler \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev

      - name: Download kernel source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Downloading from kernel-source release ==="
          gh release download kernel-source --dir .
          echo "=== Downloaded files ==="
          ls -lh
          ARCHIVE=$(ls *.zip 2>/dev/null || ls *.tar.gz 2>/dev/null)
          ARCHIVE=$(echo "$ARCHIVE" | head -1)
          echo "Using archive: $ARCHIVE"
          mkdir -p kernel_src && cd kernel_src
          if echo "$ARCHIVE" | grep -qi "\.zip$"; then
            unzip "../$ARCHIVE"
          else
            tar xf "../$ARCHIVE"
          fi
          echo "=== Top-level contents ==="
          ls -la
          if [ -f Kernel.tar.gz ]; then
            echo "Found Kernel.tar.gz, extracting..."
            tar xzf Kernel.tar.gz
          fi
          if [ -f kernel.tar.gz ]; then
            echo "Found kernel.tar.gz, extracting..."
            tar xzf kernel.tar.gz
          fi
          for f in *.tar.gz; do
            if [ -f "$f" ]; then
              echo "Extracting $f..."
              tar xzf "$f" || true
            fi
          done
          echo "=== After extraction ==="
          ls -la
          KDIR=$(find . -maxdepth 3 -name "Makefile" -exec grep -l "^VERSION" {} \; 2>/dev/null | head -1 | xargs dirname 2>/dev/null)
          if [ -z "$KDIR" ]; then
            KDIR=$(find . -maxdepth 4 -name "Makefile" | head -1 | xargs dirname 2>/dev/null)
          fi
          if [ -z "$KDIR" ]; then
            echo "ERROR: Could not find kernel Makefile"
            find . -maxdepth 3 -type f -name "Makefile" | head -20
            exit 1
          fi
          FULL_KDIR=$(cd "$KDIR" && pwd)
          echo "KERNEL_DIR=$FULL_KDIR" >> $GITHUB_ENV
          echo "Found kernel at: $FULL_KDIR"

      - name: Apply NetHunter config
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "=== Available defconfigs ==="
          ls arch/arm64/configs/ | head -20
          DEFCONFIG=$(find arch/arm64/configs -name "*s5e9925*" -o -name "*s901e*" -o -name "*exynos2200*" 2>/dev/null | head -1)
          [ -z "$DEFCONFIG" ] && DEFCONFIG=$(find arch/arm64/configs -name "*s901*" 2>/dev/null | head -1)
          [ -z "$DEFCONFIG" ] && DEFCONFIG=$(find arch/arm64/configs -name "*exynos*" 2>/dev/null | head -1)
          [ -z "$DEFCONFIG" ] && DEFCONFIG=$(find arch/arm64/configs -name "*_defconfig" | head -1)
          DEFCONFIG_NAME=$(basename "$DEFCONFIG")
          echo "Using defconfig: $DEFCONFIG_NAME"
          cp arch/arm64/configs/$DEFCONFIG_NAME arch/arm64/configs/stealth_defconfig
          cat ${{ github.workspace }}/configs/nethunter_fragment.config >> arch/arm64/configs/stealth_defconfig
          if [ "${{ inputs.extra_features }}" = "true" ]; then
            cat ${{ github.workspace }}/configs/extra_features.config >> arch/arm64/configs/stealth_defconfig
          fi

      - name: Patch KernelSU
        if: inputs.kernelsu == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          echo -e "CONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/stealth_defconfig

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export PLATFORM_VERSION=13
          export ANDROID_MAJOR_VERSION=t
          make O=out stealth_defconfig
          make O=out -j$(nproc) Image 2>&1 | tail -100
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "BUILD FAILED"
            exit 1
          fi

      - name: Package output
        if: env.BUILD_SUCCESS == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          mkdir -p ${{ github.workspace }}/output
          cp out/arch/arm64/boot/Image ${{ github.workspace }}/output/boot_image_raw.img 2>/dev/null || true
          cp out/arch/arm64/boot/Image.gz ${{ github.workspace }}/output/Image.gz 2>/dev/null || true
          cp out/.config ${{ github.workspace }}/output/kernel_config.txt 2>/dev/null || true
          ls -lh ${{ github.workspace }}/output/

      - name: Upload artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: S22-StealthStation-Kernel
          path: output/
          retention-days: 30
