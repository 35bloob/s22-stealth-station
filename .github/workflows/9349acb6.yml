name: Build S22 NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernelsu:
        description: 'Enable KernelSU'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      extra_features:
        description: 'Enable extra stealth features'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      create_release:
        description: 'Create GitHub release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc flex bison libssl-dev \
            libelf-dev git curl wget zip unzip python3 device-tree-compiler \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libncurses-dev \
            jq rsync

      - name: Replace system GCC with warning-suppressing wrapper
        run: |
          REAL_GCC=$(which aarch64-linux-gnu-gcc)
          echo "Real GCC at: $REAL_GCC"
          sudo cp "$REAL_GCC" "${REAL_GCC}.real"
          # FIX #9: heredoc content must start at column 0 so shebang is valid
          sudo tee "$REAL_GCC" > /dev/null << 'WRAPPER'
#!/bin/bash
for a in "$@"; do
  case "$a" in
    *.s|*.S) exec "${0}.real" "$@" ;;
  esac
done
exec "${0}.real" "$@" -w -Wno-error
WRAPPER
          sudo chmod +x "$REAL_GCC"
          echo "Wrapper installed. Test:"
          aarch64-linux-gnu-gcc --version | head -1
          echo "Wrapper contents:"
          cat "$REAL_GCC"

      - name: Download kernel source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download kernel-source --dir .
          ARCHIVE=$(ls *.zip 2>/dev/null | head -1)
          [ -z "$ARCHIVE" ] && ARCHIVE=$(ls *.tar.gz 2>/dev/null | head -1)
          echo "Archive: $ARCHIVE"
          mkdir -p kernel_src && cd kernel_src
          if echo "$ARCHIVE" | grep -qi '\.zip$'; then
            unzip "../$ARCHIVE"
          else
            tar xf "../$ARCHIVE"
          fi
          # FIX #5: debug inner extraction
          echo "Files in kernel_src after primary extraction:"
          ls -la
          for f in *.tar.gz; do
            [ -f "$f" ] && echo "Extracting nested: $f" && tar xzf "$f" || true
          done
          chmod -R u+w .
          KDIR=$(find . -maxdepth 5 -type d -name "arch" -exec test -d "{}/arm64/configs" \; -print 2>/dev/null | head -1 | sed 's|/arch$||')
          if [ -z "$KDIR" ]; then
            echo "ERROR: No arch/arm64/configs found"
            exit 1
          fi
          FULL=$(cd "$KDIR" && pwd)
          echo "KERNEL_DIR=$FULL" >> $GITHUB_ENV
          echo "Verified KERNEL_DIR: $FULL"
          # FIX #2: sanity check the path is valid
          ls "$FULL/arch/arm64/configs/" | head -5

      - name: Patch source and disable forbidden-warning system
        run: |
          # FIX #2: guard against empty KERNEL_DIR
          [ -z "${{ env.KERNEL_DIR }}" ] && echo "ERROR: KERNEL_DIR not set" && exit 1
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          python3 -c "
import os, re

print('=== PATCHING SOURCE FILES ===')
for root, dirs, files in os.walk('.'):
    for fname in files:
        fpath = os.path.join(root, fname)
        if fname == 'cred.c':
            with open(fpath, 'rb') as f:
                raw = f.read()
            text = raw.decode('utf-8', errors='replace')
            if '0x%lx' in text:
                text = text.replace('0x%lx', '%p')
                with open(fpath, 'wb') as f:
                    f.write(text.encode('utf-8'))
                print(f'PATCHED {fpath}')
            else:
                print(f'SKIP {fpath} (no 0x%lx)')
        elif fname == 'kernel.h' and 'include/linux' in root:
            t = open(fpath).read()
            if 'TRACING_MARK_TYPE_END, \"\"' in t:
                t = t.replace('TRACING_MARK_TYPE_END, \"\"', 'TRACING_MARK_TYPE_END, \" \"')
                open(fpath, 'w').write(t)
                print(f'PATCHED {fpath} (tracing)')
        elif fname == 'psi.c' and 'kernel/sched' in root:
            t = open(fpath).read()
            if '%lu' in t:
                t = t.replace('%lu', '%llu')
                open(fpath, 'w').write(t)
                print(f'PATCHED {fpath}')

print()
print('=== PATCHING f2fs flush_group ===')
for root, dirs, files in os.walk('fs/f2fs'):
    for fname in files:
        if fname == 'data.c':
            fpath = os.path.join(root, fname)
            t = open(fpath).read()
            if 'flush_group' in t:
                t = t.replace('in_group_p(F2FS_OPTION(sbi).flush_group)', '0')
                open(fpath, 'w').write(t)
                print(f'PATCHED {fpath} (flush_group -> 0)')
            else:
                print(f'SKIP {fpath} (no flush_group)')

print()
print('=== PATCHING bluetooth hci_sock.c ===')
hci = 'net/bluetooth/hci_sock.c'
if os.path.exists(hci):
    hlines = open(hci).readlines()
    ioctl_start = -1
    ioctl_brace = -1
    for i, hl in enumerate(hlines):
        if 'hci_sock_ioctl' in hl and ('static' in hl or 'int' in hl):
            ioctl_start = i
        if ioctl_start >= 0 and ioctl_brace < 0 and '{' in hl:
            ioctl_brace = i
            break
    if ioctl_brace >= 0:
        # FIX #10: guard against redeclaration
        context = ''.join(hlines[ioctl_brace:ioctl_brace+20])
        if 'struct sock *sk' not in context:
            decls = '\tstruct sock *sk = sock->sk;\n\tvoid __user *argp = (void __user *)arg;\n\tint err = 0;\n'
            hlines.insert(ioctl_brace+1, decls)
            print(f'PATCHED {hci} (added declarations at line {ioctl_brace+2})')
        else:
            print(f'SKIP {hci} declarations (already present)')
        fixed_count = 0
        for i in range(ioctl_brace+4, min(ioctl_brace+400, len(hlines))):
            if hlines[i].rstrip() == '}' and not hlines[i].startswith('\t\t'):
                break
            if hlines[i].strip() == '*/':
                hlines[i] = '/* (patched) */\n'
                print(f'PATCHED {hci} (bare comment end at line {i+1})')
                fixed_count += 1
        print(f'Fixed {fixed_count} bare */ lines in hci_sock_ioctl')
    else:
        print(f'SKIP {hci} (hci_sock_ioctl not found)')
    open(hci, 'w').writelines(hlines)
else:
    print(f'SKIP {hci} (not found)')

print()
print('=== PATCHING selinux services.c (missing out label) ===')
sef = 'security/selinux/ss/services.c'
if os.path.exists(sef):
    slines = open(sef).readlines()
    in_func = False
    goto_found = False
    patched = False
    for i, sl in enumerate(slines):
        if 'security_get_user_sids' in sl and '(' in sl:
            in_func = True
        if in_func and 'goto out;' in sl:
            goto_found = True
        if in_func and goto_found and sl.rstrip() == '}':
            slines.insert(i, 'out:\n')
            open(sef, 'w').writelines(slines)
            print(f'PATCHED {sef} (added out: label at line {i})')
            patched = True
            break
    if not patched:
        print(f'SKIP {sef} (no patch needed)')
else:
    print(f'SKIP {sef} (not found)')

print()
print('=== REPLACING cc-wrapper.c WITH PASS-THROUGH ===')
replaced = 0
for root, dirs, files in os.walk('scripts'):
    for fname in files:
        if fname == 'cc-wrapper.c':
            fpath = os.path.join(root, fname)
            clines = [
                '#include <stdio.h>',
                '#include <stdlib.h>',
                '#include <unistd.h>',
                '',
                'int main(int argc, char **argv) {',
                '    if (argc < 2) return 1;',
                '    execvp(argv[1], argv + 1);',
                '    return 1;',
                '}',
            ]
            open(fpath, 'w').write(chr(10).join(clines) + chr(10))
            print(f'REPLACED: {fpath} (pass-through, no forbidden checks)')
            replaced += 1
if replaced == 0:
    print('INFO: cc-wrapper.c not found in scripts/ (may not exist in this kernel tree)')

print()
print('=== STRIPPING -Werror FROM MAKEFILES ===')
for root, dirs, files in os.walk('.'):
    for fname in files:
        if 'Makefile' in fname or fname.endswith('.mk'):
            fpath = os.path.join(root, fname)
            try:
                t = open(fpath).read()
                if '-Werror' in t:
                    t = re.sub(r'-Werror[=\w.-]*', '', t)
                    open(fpath, 'w').write(t)
                    print(f'CLEANED: {fpath}')
            except: pass

print()
print('=== FIX SAMSUNG u/U/UL/ULL SUFFIX — HEADERS ONLY ===')
# FIX #3: limit to .h files only to avoid corrupting .c/.S source
# FIX #3: tightened decimal regex to avoid matching inside strings/identifiers
import re as _re
_suffix_hex = _re.compile(r'(0x[0-9a-fA-F]+)[uUlL]+\b')
_suffix_dec = _re.compile(r'(?<!["\w])\b([0-9]+)[uUlL]+\b(?!["_\w])')
count = 0
for root, dirs, files in os.walk('.'):
    if '.git' in root.split(os.sep) or '/out' in root:
        continue
    for fname in files:
        # FIX #3: .h files only
        if not fname.endswith('.h'):
            continue
        fpath = os.path.join(root, fname)
        try:
            t = open(fpath).read()
            t2 = _suffix_hex.sub(r'\1', t)
            t2 = _suffix_dec.sub(r'\1', t2)
            if t != t2:
                open(fpath, 'w').write(t2)
                count += 1
        except: pass
print(f'Stripped integer type suffixes from {count} header files')

print()
print('=== DELETING GCC PLUGINS ===')
for root, dirs, files in os.walk('scripts'):
    for fname in files:
        if fname.endswith('.so'):
            p = os.path.join(root, fname)
            os.remove(p)
            print(f'DELETED plugin: {p}')
"

      - name: Add RTL8188FTV driver
        run: |
          cd ${{ env.KERNEL_DIR }}
          git clone --depth=1 https://github.com/kelebek333/rtl8188fu /tmp/rtl8188fu || true
          if [ -d /tmp/rtl8188fu ]; then
            mkdir -p drivers/net/wireless/rtl8188fu
            cp -r /tmp/rtl8188fu/* drivers/net/wireless/rtl8188fu/
            printf 'config RTL8188FU\n  tristate "Realtek RTL8188FU USB WiFi"\n  depends on USB && CFG80211\n  help\n    Enable support for Realtek RTL8188FU/FTV USB WiFi adapters.\n' > drivers/net/wireless/rtl8188fu/Kconfig
            grep -q "rtl8188fu" drivers/net/wireless/Makefile 2>/dev/null || \
              echo 'obj-$(CONFIG_RTL8188FU) += rtl8188fu/' >> drivers/net/wireless/Makefile
            grep -q "rtl8188fu" drivers/net/wireless/Kconfig 2>/dev/null || \
              echo 'source "drivers/net/wireless/rtl8188fu/Kconfig"' >> drivers/net/wireless/Kconfig
            cat > drivers/net/wireless/rtl8188fu/Kbuild << 'KBEOF'
ccflags-y += -I$(srctree)/$(src)/include
ccflags-y += -I$(srctree)/$(src)/hal/phydm
include $(srctree)/$(src)/Makefile
KBEOF
            echo "RTL8188FU: created Kbuild wrapper"
          fi

      - name: Apply NetHunter config
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          DC=""
          for p in "*s5e9925*" "*dm1s*" "*dm1*" "*s901*" "*exynos*" "*samsung*"; do
            DC=$(find arch/arm64/configs -type f -name "$p" 2>/dev/null | head -1)
            [ -n "$DC" ] && break
          done
          if [ -z "$DC" ]; then
            if [ -f arch/arm64/configs/gki_defconfig ]; then
              DC=arch/arm64/configs/gki_defconfig
            else
              DC=$(find arch/arm64/configs -maxdepth 1 -type f -name '*defconfig' | head -1)
            fi
          fi
          cp "$DC" arch/arm64/configs/stealth_defconfig
          if [ -d arch/arm64/configs/vendor ]; then
            find arch/arm64/configs/vendor -type f | while read frag; do
              # FIX #6: ensure newline separator between fragments
              echo "" >> arch/arm64/configs/stealth_defconfig
              cat "$frag" >> arch/arm64/configs/stealth_defconfig
            done
          fi
          cat ${{ github.workspace }}/configs/nethunter_fragment.config >> arch/arm64/configs/stealth_defconfig
          if [ "${{ github.event.inputs.extra_features }}" = "true" ]; then
            cat ${{ github.workspace }}/configs/extra_features.config >> arch/arm64/configs/stealth_defconfig
          fi
          printf 'CONFIG_WERROR=n\n# CONFIG_GCC_PLUGINS is not set\n' >> arch/arm64/configs/stealth_defconfig

      - name: Patch KernelSU
        # FIX #1: inputs.kernelsu -> github.event.inputs.kernelsu
        if: github.event.inputs.kernelsu == 'true'
        run: |
          cd ${{ env.KERNEL_DIR }}
          chmod -R u+w .
          # FIX #8: pin KernelSU to a specific release tag instead of main HEAD
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/v0.9.5/kernel/setup.sh" | bash -
          printf 'CONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y\n' >> arch/arm64/configs/stealth_defconfig

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "========================================"
          echo " PRE-BUILD VERIFICATION"
          echo "========================================"
          echo ""
          echo "--- cred.c line 161 RIGHT NOW ---"
          sed -n '158,165p' kernel/cred.c
          echo ""
          echo "--- grep 0x%lx in cred.c ---"
          grep -n "0x%lx" kernel/cred.c || echo "CLEAN - no 0x%lx found"
          echo ""
          echo "--- GCC wrapper check ---"
          cat $(which aarch64-linux-gnu-gcc)
          echo ""
          echo "--- LAST-RESORT: patch cred.c ---"
          python3 -c "
p='kernel/cred.c'
t=open(p).read()
n=t.count('0x' + chr(37) + 'lx')
print('0x%%lx count before: ' + str(n))
t=t.replace('0x' + chr(37) + 'lx', chr(37) + 'p')
open(p,'w').write(t)
print('0x%%lx count after: ' + str(t.count('0x' + chr(37) + 'lx')))
"
          echo ""
          echo "--- cred.c line 161 AFTER fix ---"
          sed -n '158,165p' kernel/cred.c
          echo ""
          echo "========================================"
          echo " STARTING BUILD"
          echo "========================================"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export PLATFORM_VERSION=13
          export ANDROID_MAJOR_VERSION=t
          make O=out stealth_defconfig
          sed -i 's/CONFIG_WERROR=y/CONFIG_WERROR=n/' out/.config
          sed -i 's/CONFIG_GCC_PLUGINS=y/# CONFIG_GCC_PLUGINS is not set/' out/.config
          # FIX #7: removed redundant KCFLAGS="-w" since GCC wrapper already injects -w -Wno-error
          make O=out -j$(nproc) Image 2>&1
          if [ -f out/arch/arm64/boot/Image ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
            echo "=== BUILD SUCCESS ==="
          else
            echo "=== BUILD FAILED ==="
            exit 1
          fi

      - name: Package with AnyKernel3
        if: env.BUILD_SUCCESS == 'true'
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 /tmp/AnyKernel3
          rm -f /tmp/AnyKernel3/anykernel.sh
          cp ${{ github.workspace }}/anykernel/anykernel.sh /tmp/AnyKernel3/anykernel.sh
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image /tmp/AnyKernel3/Image
          cd /tmp/AnyKernel3
          rm -f *.md patch/sample* ramdisk/placeholder 2>/dev/null || true
          # FIX #11: use seconds precision to avoid tag collision
          BUILD_DATE=$(date +%Y%m%d-%H%M%S)
          ZIP_NAME="S22-StealthStation-${BUILD_DATE}.zip"
          zip -r9 "$ZIP_NAME" . -x ".git/*"
          mkdir -p ${{ github.workspace }}/output
          cp "$ZIP_NAME" ${{ github.workspace }}/output/
          cp ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image ${{ github.workspace }}/output/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV

      - name: Upload artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: S22-StealthStation-Kernel
          path: output/
          retention-days: 30

      - name: Create GitHub release
        # FIX #1: inputs.create_release -> github.event.inputs.create_release
        if: env.BUILD_SUCCESS == 'true' && github.event.inputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="kernel-${{ env.BUILD_DATE }}"
          gh release create "$TAG" \
            ${{ github.workspace }}/output/${{ env.ZIP_NAME }} \
            ${{ github.workspace }}/output/Image \
            --title "S22 StealthStation ${{ env.BUILD_DATE }}" \
            --notes "KernelSU=${{ github.event.inputs.kernelsu }} | ExtraFeatures=${{ github.event.inputs.extra_features }}" \
            --latest
